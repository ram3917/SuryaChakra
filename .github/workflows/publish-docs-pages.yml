name: Publish docs to GitHub Wiki

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'suryaautomobiles-docs/**'
      - '.github/workflows/publish-docs-pages.yml'

permissions:
  contents: write
  pages: write

jobs:
  publish-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx myst-parser furo sphinxcontrib-plantuml

      - name: Build docs to validate the source
        run: |
          sphinx-build -b html suryaautomobiles-docs suryaautomobiles-docs/_build/html

      - name: Clone wiki repository
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"
          WIKI_REPO="${OWNER}/${REPO_NAME}.wiki"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${WIKI_REPO}.git"

          git ls-remote "$REMOTE" >/dev/null 2>&1 || {
            echo "Wiki repository ${WIKI_REPO} does not exist yet. Create it in GitHub first, then rerun the workflow." >&2
            exit 1
          }

          git clone "$REMOTE" wiki

      - name: Prepare wiki content
        shell: bash
        run: |
          set -euo pipefail
          rm -rf wiki/*
          mkdir -p wiki/docs
          cp suryaautomobiles-docs/index.md wiki/Home.md
          cp -r suryaautomobiles-docs/docs/. wiki/docs/

      - name: Commit and push wiki updates
        working-directory: wiki
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to publish."
          else
            git commit -m "Update wiki docs from ${{ github.sha }}"
            git push
          fi
